        ["Eggs (free range)","6-pack","~$3.50"],
      ]},
      {cat:"🌾 Carbs & Grains",color:"#fef9e7",border:"#f5d97f",items:[
        ["Quinoa","500g bag","~$4.00"],["Rolled oats","(carry over)","—"],
        ["Sourdough bread","1 loaf","~$4.00"],["Chia seeds","(carry over)","—"],
        ["Rice cakes","(carry over)","—"],
      ]},
      {cat:"🥦 Vegetables & Fruit",color:"#e8f5e9",border:"#81c784",items:[
        ["Sweet potato","600g","~$2.50"],["Broccoli","2 heads","~$3.00"],

        ["Oranges","5","~$3.00"],["Frozen mixed berries","500g bag","~$5.00"],
        ["Lemons","3","~$2.00"],
      ]},
      {cat:"🫙 Pantry",color:"#e3f2fd",border:"#90caf9",items:[
        ["Canned chickpeas","1 × 400g can","~$1.50"],["Almond milk","2 × 1L","~$5.00"],
        ["Peanut butter","1 jar","~$4.50"],["Mixed nuts","200g bag","~$5.00"],
        ["Paprika (smoked)","small jar","~$2.00"],["Garlic powder","(carry over)","—"],
        ["Mixed herbs","(carry over)","—"],["Olive oil","(carry over)","—"],
        ["Pumpkin/sunflower seeds","100g","~$3.00"],
      ]},
    ],
    totalCost:"~$90–$105",
  },
];

let currentWeek = 0;
let currentMain = 'overview';
const checked = {};

function switchWeek(idx){
  currentWeek = idx;
  document.querySelectorAll('.wtab').forEach((b,i)=>{b.className='wtab '+(i===idx?'active':'inactive')});
  renderAll();
}

function switchMain(tab, btn){
  currentMain = tab;
  document.querySelectorAll('.mtab').forEach(b=>{b.className='mtab inactive'});
  btn.className='mtab active';
  document.querySelectorAll('.content').forEach(el=>el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  renderAll();
}

function renderAll(){
  renderWeekTabs();
  if(currentMain==='overview') renderOverview();
  if(currentMain==='days') renderDays();
  if(currentMain==='prep') renderPrep();
  if(currentMain==='grocery') renderGrocery();
}

function renderWeekTabs(){
  document.getElementById('weekTabs').innerHTML = weeks.map((w,i)=>`
    <button class="wtab ${i===currentWeek?'active':'inactive'}" onclick="switchWeek(${i})">${w.emoji} ${w.label}</button>
  `).join('');
}

function renderOverview(){
  const w = weeks[currentWeek];
  document.getElementById('tab-overview').innerHTML = `
    <div class="week-hero" style="background:linear-gradient(135deg,${w.colors[0]},${w.colors[1]})">
      <h2>${w.emoji} ${w.label}</h2>
      <div class="theme">🍽️ ${w.theme}</div>
      <div class="note">🥣 Breakfasts are quick daily options (5–10 min max). Lunches & dinners are batch-prepped every Sunday in 60 minutes.<br><br>⚡ ${w.protein_note}</div>
    </div>

    <div class="info-pill">✅ <strong>2,000 kcal target</strong> — At 75 kg / 5'7" your TDEE is ~2,500 kcal. This 500 kcal deficit targets ~0.5 kg/week fat loss. On 3 workout days, add your protein shake (+120 kcal / 24g protein).</div>

    <div class="section-title">🥗 This Week's Lunch</div>
    <div class="prep-card">
      <h3>${w.lunch.name}</h3>
      <div class="desc">${w.lunch.desc}</div>
      <div class="desc" style="color:#888;font-size:11px">🧺 ${w.lunch.ing}</div>
      <div class="macro-row">
        <div class="macro-chip"><div class="mlabel">Calories</div><div class="mval" style="color:#2d6a4f">${w.lunch.macros.kcal}</div></div>
        <div class="macro-chip"><div class="mlabel">Carbs</div><div class="mval" style="color:#f4a261">${w.lunch.macros.carbs}g</div></div>
        <div class="macro-chip"><div class="mlabel">Protein</div><div class="mval" style="color:#52b788">${w.lunch.macros.prot}g</div></div>
        <div class="macro-chip"><div class="mlabel">Fat</div><div class="mval" style="color:#e76f51">${w.lunch.macros.fat}g</div></div>
        <div class="macro-chip"><div class="mlabel">🌿 Fibre</div><div class="mval" style="color:#40916c">${w.lunch.macros.fibre}g</div></div>
      </div>
    </div>

    <div class="section-title">🍽️ This Week's Dinner</div>
    <div class="prep-card">
      <h3>${w.dinner.name}</h3>
      <div class="desc">${w.dinner.desc}</div>
      <div class="desc" style="color:#888;font-size:11px">🧺 ${w.dinner.ing}</div>
      <div class="macro-row">
        <div class="macro-chip"><div class="mlabel">Calories</div><div class="mval" style="color:#2d6a4f">${w.dinner.macros.kcal}</div></div>
        <div class="macro-chip"><div class="mlabel">Carbs</div><div class="mval" style="color:#f4a261">${w.dinner.macros.carbs}g</div></div>
        <div class="macro-chip"><div class="mlabel">Protein</div><div class="mval" style="color:#52b788">${w.dinner.macros.prot}g</div></div>
        <div class="macro-chip"><div class="mlabel">Fat</div><div class="mval" style="color:#e76f51">${w.dinner.macros.fat}g</div></div>
        <div class="macro-chip"><div class="mlabel">🌿 Fibre</div><div class="mval" style="color:#40916c">${w.dinner.macros.fibre}g</div></div>
      </div>
    </div>

    <div class="section-title">🌅 Breakfast Options This Week</div>
    ${w.breakfasts.map(b=>`
      <div class="prep-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
          <h3 style="font-size:13px">${b.name}</h3>
          <span style="background:#e8f5e9;color:#2d6a4f;font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px">⏱️ ${b.mins} min</span>
        </div>
        <div style="font-size:11px;color:#888;margin-bottom:8px">📅 ${b.day}</div>
        <div class="desc" style="margin-bottom:8px">🧺 ${b.ing}</div>
        <div class="macro-row">
          <div class="macro-chip"><div class="mlabel">kcal</div><div class="mval" style="color:#2d6a4f">${b.kcal}</div></div>
          <div class="macro-chip"><div class="mlabel">Carbs</div><div class="mval" style="color:#f4a261">${b.carbs}g</div></div>
          <div class="macro-chip"><div class="mlabel">Protein</div><div class="mval" style="color:#52b788">${b.prot}g</div></div>
          <div class="macro-chip"><div class="mlabel">🌿 Fibre</div><div class="mval" style="color:#40916c">${b.fibre}g</div></div>
        </div>
      </div>`).join('')}

    <div class="section-title">🍎 Daily Snack</div>
    <div class="prep-card">
      <h3>${w.snack.name}</h3>
      <div class="desc">🧺 ${w.snack.ing}</div>
      <div class="macro-row">
        <div class="macro-chip"><div class="mlabel">kcal</div><div class="mval" style="color:#2d6a4f">${w.snack.kcal}</div></div>
        <div class="macro-chip"><div class="mlabel">Protein</div><div class="mval" style="color:#52b788">${w.snack.prot}g</div></div>
        <div class="macro-chip"><div class="mlabel">🌿 Fibre</div><div class="mval" style="color:#40916c">${w.snack.fibre}g</div></div>
      </div>
    </div>
  `;
}

const dayNames = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const dayEmojis = ['💪','🔥','⚡','💎','🎯','😎','🌿'];
const workoutDays = [0,2,4]; // Mon, Wed, Fri

function renderDays(){
  const w = weeks[currentWeek];
  let html = `<div class="info-pill" style="margin-bottom:14px">🔁 Lunch & dinner are the <strong>same meal each day</strong> of the week — batch prepped on Sunday. Only breakfasts rotate for variety.</div>`;

  for(let d=0;d<7;d++){
    const isWorkout = workoutDays.includes(d);
    const bfIdx = d<5 ? (d%2===0?0:1) : 2;
    const bf = w.breakfasts[bfIdx];
    // pick a lunch/dinner only for weekdays; weekends lighter
    const hasPrep = d<5;
    const dayTotalKcal = bf.kcal + w.snack.kcal + (hasPrep ? w.lunch.macros.kcal + w.dinner.macros.kcal : Math.round((w.lunch.macros.kcal+w.dinner.macros.kcal)*0.9)) + (isWorkout?120:0);

    html += `
      <div class="day-card">
        <div class="day-header-row" onclick="toggleDay(${d})">
          <div class="day-emoji">${dayEmojis[d]}</div>
          <div class="day-info">
            <div class="day-name">${dayNames[d]}${isWorkout?' 🏋️':''}</div>
            <div class="day-sub">${bf.name} · ${hasPrep?w.lunch.name.split(' ').slice(0,3).join(' ')+'...':'Flexible'}</div>
          </div>
          <div class="day-kcal">${dayTotalKcal} kcal</div>
          <div class="chev" id="chev-${d}">▼</div>
        </div>
        <div class="day-detail" id="detail-${d}">
          <div class="meal-row">
            <div class="meal-type-label">🌅 Breakfast · ${bf.mins} min prep</div>
            <div class="meal-name">${bf.name}</div>
            <div class="meal-ing">${bf.ing}</div>
            <div class="meal-macros"><span class="mm">${bf.kcal} kcal</span><span class="mm">${bf.prot}g protein</span><span class="fibre-badge">🌿 ${bf.fibre}g fibre</span></div>
          </div>
          ${hasPrep?`
          <div class="meal-row">
            <div class="meal-type-label">☀️ Lunch · Batch prepped Sunday</div>
            <div class="meal-name">${w.lunch.name}</div>
            <div class="meal-ing">${w.lunch.ing}</div>
            <div class="meal-macros"><span class="mm">${w.lunch.macros.kcal} kcal</span><span class="mm">${w.lunch.macros.prot}g protein</span><span class="fibre-badge">🌿 ${w.lunch.macros.fibre}g fibre</span></div>
          </div>
          <div class="meal-row">
            <div class="meal-type-label">🌙 Dinner · Batch prepped Sunday</div>
            <div class="meal-name">${w.dinner.name}</div>
            <div class="meal-ing">${w.dinner.ing}</div>
            <div class="meal-macros"><span class="mm">${w.dinner.macros.kcal} kcal</span><span class="mm">${w.dinner.macros.prot}g protein</span><span class="fibre-badge">🌿 ${w.dinner.macros.fibre}g fibre</span></div>
          </div>`:
          `<div class="meal-row"><div class="meal-type-label">🍽️ Weekend Meals</div><div class="meal-name">Flexible — use any remaining meal prep or cook fresh</div></div>`}
          <div class="meal-row">
            <div class="meal-type-label">🍎 Snack</div>
            <div class="meal-name">${w.snack.name}</div>
            <div class="meal-ing">${w.snack.ing}</div>
            <div class="meal-macros"><span class="mm">${w.snack.kcal} kcal</span><span class="fibre-badge">🌿 ${w.snack.fibre}g fibre</span></div>
          </div>
          ${isWorkout?`<div class="meal-row"><div class="meal-type-label" style="color:#4a90c4">🥤 Post-Workout Shake</div><div class="meal-name">Protein Shake (+120 kcal · +24g protein)</div></div>`:''}
        </div>
      </div>`;
  }
  document.getElementById('tab-days').innerHTML = html;
}

function toggleDay(d){
  const detail = document.getElementById('detail-'+d);
  const chev = document.getElementById('chev-'+d);
  const isOpen = detail.classList.contains('open');
  detail.classList.toggle('open',!isOpen);
  chev.classList.toggle('open',!isOpen);
}

function renderPrep(){
  const w = weeks[currentWeek];
  document.getElementById('tab-prep').innerHTML = `
    <div class="info-pill">🗓️ <strong>Every Sunday</strong> — Set aside 60 minutes to batch-prep all 5 lunches and 5 dinners. Store in airtight containers. Lasts Mon–Fri in the fridge.</div>

    <div class="prep-timeline">
      <div class="timeline-title">⏱️ Sunday Prep Timeline <span class="time-badge">60 min total</span></div>
      ${w.prepTimeline.map(t=>`
        <div class="tl-row">
          <div class="tl-time">${t.time}</div>
          <div class="tl-text">${t.task}</div>
        </div>`).join('')}
    </div>

    <div class="section-title">🍱 What You're Making</div>
    <div class="prep-card">
      <h3>5× Lunch: ${w.lunch.name}</h3>
      <div class="desc">${w.lunch.desc}</div>
    </div>
    <div class="prep-card">
      <h3>5× Dinner: ${w.dinner.name}</h3>
      <div class="desc">${w.dinner.desc}</div>
    </div>

    <div class="section-title">💡 Meal Prep Tips</div>
    <div class="prep-card">
      <div class="prep-steps">
        <div class="step-title">Make it faster</div>
        <div class="step"><div class="step-num">1</div><div>Use a rice cooker — set and forget while you cook protein.</div></div>
        <div class="step"><div class="step-num">2</div><div>Buy pre-cut veg from Aldi when available to save chopping time.</div></div>
        <div class="step"><div class="step-num">3</div><div>Use a large baking tray so protein + veg cook together.</div></div>
        <div class="step"><div class="step-num">4</div><div>Label containers with Mon–Fri so you grab the right one each day.</div></div>
        <div class="step"><div class="step-num">5</div><div>Freeze Friday's dinner on Sunday — it stays fresher.</div></div>
      </div>
    </div>
  `;
}

function renderGrocery(){
  const w = weeks[currentWeek];
  let totalItems = 0;
  w.grocery.forEach(c=>totalItems+=c.items.length);

  let checkedCount = Object.values(checked).filter(Boolean).length;

  let html = `
    <div class="g-summary">
      <div class="prog-row">
        <div><div class="g-title">🛒 Week ${w.week} — Aldi List</div><div class="g-hint">Tap items to check off as you shop</div></div>
        <div style="text-align:right"><div class="prog-num" id="progNum">${checkedCount}/${totalItems}</div><div style="font-size:10px;color:#888">checked</div></div>
      </div>
      <div class="bar-bg"><div class="bar-fill" id="progBar" style="width:${totalItems>0?(checkedCount/totalItems*100):0}%"></div></div>
    </div>`;

  w.grocery.forEach((cat,ci)=>{
    html+=`<div class="cat-label">${cat.name}</div><div class="cat-list" style="border:1px solid ${cat.border}">`;
    cat.items.forEach((item,ii)=>{
      const key=`w${currentWeek}-${ci}-${ii}`;
      const isCO = item[2]==='—';
      const isChecked=!!checked[key];
      html+=`<div class="g-item" style="background:${isChecked?'#f0faf4':cat.color}" onclick="toggleCheck('${key}',this,${totalItems})">
        <div class="cb ${isChecked?'checked':''}" id="cb-${key}">${isChecked?'✓':''}</div>
        <div style="flex:1">
          <div class="i-name ${isChecked?'checked':''}" id="nm-${key}">${item[0]}${isCO?' <span style="color:#aaa;font-size:10px">(carry over)</span>':''}</div>
          <div class="i-qty">${item[1]}</div>
        </div>
        <div class="i-cost">${item[2]}</div>
      </div>`;
    });
    html+=`</div>`;
  });

  html+=`<div class="total-box"><div class="total-sub">Week ${w.week} Estimated Total</div><div class="total-amt">${w.totalCost}</div><div class="total-note">AUD · Carry-over pantry items reduce cost each week</div></div>`;

  document.getElementById('tab-grocery').innerHTML = html;
}

function toggleCheck(key,row,total){
  checked[key] = !checked[key];
  const cb=document.getElementById('cb-'+key);
  const nm=document.getElementById('nm-'+key);
  if(checked[key]){cb.classList.add('checked');cb.textContent='✓';nm.classList.add('checked');row.style.background='#f0faf4';}
  else{cb.classList.remove('checked');cb.textContent='';nm.classList.remove('checked');}
  const done=Object.values(checked).filter(Boolean).length;
  const pn=document.getElementById('progNum');
  const pb=document.getElementById('progBar');
  if(pn) pn.textContent=done+'/'+total;
  if(pb) pb.style.width=(done/total*100)+'%';
}

renderAll();
</script>
</body>
</html>
